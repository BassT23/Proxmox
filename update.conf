# =============================================================================
# The Ultimate Updater for Proxmox VE — Configuration File
# =============================================================================
# Set values to true or false.
# Changes take effect on the next run.
# Run "update --config" for an interactive configuration wizard.
# =============================================================================

VERSION="2.0.0"

# Branch to track: master | beta | develop
USED_BRANCH="master"

# Enable debug output (set -x)
DEBUG="false"

# Log file paths
LOG_FILE="/var/log/ultimate-updater.log"
ERROR_LOG_FILE="/var/log/ultimate-updater-error.log"

# Check for new versions of The Ultimate Updater on startup
VERSION_CHECK="true"

# SSH port used to reach other cluster nodes
SSH_PORT="22"

# Internet connectivity check
# Use "ping" (default) or "curl" (curl must be installed)
EXE_FOR_INTERNET_CHECK="ping"
URL_FOR_INTERNET_CHECK="google.com"

# =============================================================================
# Notifications
# =============================================================================

# Email address to send update summaries to (uses the system "mail" command)
EMAIL_USER="root"

# Send an email even when there are no updates
EMAIL_NO_UPDATES="false"

# Send email only when security updates are available (check-updates.sh)
EMAIL_ONLY_SECURITY="false"

# =============================================================================
# Updater — what to update
# =============================================================================

# Stop the entire run immediately on the first error
EXIT_ON_ERROR="false"

# Update the Proxmox host itself
WITH_HOST="true"

# Update LXC containers
WITH_LXC="true"

# Update VMs
WITH_VM="true"

# Update stopped containers by starting them, updating, then stopping them again
STOPPED_CONTAINER="true"

# Update containers that are already running
RUNNING_CONTAINER="true"

# Update stopped VMs (requires QEMU agent or SSH config)
STOPPED_VM="true"

# Update VMs that are already running
RUNNING_VM="true"

# Seconds to wait after starting a stopped LXC before attempting to connect
LXC_START_DELAY="5"

# Seconds to wait for QEMU agent to become available after VM start
VM_START_DELAY="45"

# Reboot containers and VMs after update if /var/run/reboot-required exists
REEBOOT_IF_NEEDED="false"

# Include FreeBSD VM updates
FREEBSD_UPDATES="false"

# Include APT phased updates (Ubuntu/Debian staged rollouts)
INCLUDE_PHASED_UPDATES="false"

# Run fstrim on LXC containers after update (reduces LVM thin-pool usage)
INCLUDE_FSTRIM="false"

# Include mount points when running fstrim
# This line must be "true" or "false" — commenting it out defaults to true
FSTRIM_WITH_MOUNTPOINT="true"

# Optional environment prefix for pacman (e.g. "env http_proxy=http://proxy:3128")
PACMAN_ENVIRONMENT=""

# Run community helper scripts after update (requires community-scripts installed)
INCLUDE_HELPER_SCRIPTS="false"

# =============================================================================
# Filters — limit which containers and VMs are updated
# =============================================================================
# Accepts: Proxmox tags, VM/CT IDs, ID ranges (e.g. 100-105), or combinations.
# Examples:
#   ONLY="production"          — only containers/VMs tagged "production"
#   ONLY="101,105,200-210"     — only specific IDs and a range
#   EXCLUDE="testing,300-305"  — skip containers/VMs tagged "testing" or in range
#
# If ONLY is set, EXCLUDE is ignored.

ONLY=""
EXCLUDE=""

# =============================================================================
# Snapshot / Backup
# =============================================================================
# Snapshots are fast but require compatible storage (ZFS, LVM-Thin, etc.).
# Backups are slower but work on all storage types.
# Recommendation: use the Proxmox UI for scheduled nightly backups instead.

# Create a snapshot before each update
SNAPSHOT="true"

# Number of update snapshots to keep per container/VM
KEEP_SNAPSHOTS="3"

# Create a full backup before each update (slower)
BACKUP="false"

# If a container has mount points (snapshot not possible), use backup instead
BACKUP_LXC_MP="true"

# Backup mode: stop | suspend | snapshot
#   stop     — highest consistency, causes downtime, not compatible with HA
#   suspend  — good consistency, minimal downtime, compatible with HA
#   snapshot — live backup, no downtime, requires supported storage (ZFS, LVM-Thin, Ceph)
BACKUP_MODE="stop"

# =============================================================================
# Extra updates (plugins)
# =============================================================================
# Plugins are scripts in the plugins/ directory. Each plugin checks whether
# its application is installed before doing anything.
# Set EXTRA_GLOBAL="false" to disable all plugins at once.

EXTRA_GLOBAL="true"

# Run plugins even in headless/silent mode
IN_HEADLESS_MODE="false"

# --- Plugin toggles ---
# Each value enables or disables the corresponding plugin script.

PIHOLE="true"
IOBROKER="true"
PTERODACTYL="true"
OCTOPRINT="true"
UNIFI="true"

# Docker Compose — pulls updated images and recreates containers
DOCKER_COMPOSE="true"

# Search path for docker-compose.yml / compose.yml files
COMPOSE_PATH="/home"

# Run "docker system prune -a -f --volumes" after updating Docker projects.
# WARNING: This permanently removes ALL unused images, containers, networks,
# and volumes — including those unrelated to the updated projects.
DOCKER_PRUNE="false"

# =============================================================================
# Update checker (welcome screen)
# =============================================================================

CHECK_WITH_HOST="true"
CHECK_WITH_LXC="true"
CHECK_WITH_VM="true"

CHECK_STOPPED_CONTAINER="true"
CHECK_RUNNING_CONTAINER="true"
CHECK_STOPPED_VM="true"
CHECK_PAUSED_VM="true"
CHECK_RUNNING_VM="true"

# Filters for the update checker (same syntax as ONLY/EXCLUDE above)
ONLY_UPDATE_CHECK=""
EXCLUDE_UPDATE_CHECK=""
